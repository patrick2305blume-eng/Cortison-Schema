<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profi Cortison-Rechner (Teupe)</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #121212; color: white; padding: 15px; }
        .container { max-width: 500px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        h2 { color: #f39c12; text-align: center; margin-top: 0; }
        .section-title { font-size: 14px; color: #f39c12; margin: 20px 0 10px 0; border-bottom: 1px solid #333; padding-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; margin-bottom: 5px; color: #aaa; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #2c2c2c; color: white; box-sizing: border-box; font-size: 16px; }
        
        .result-box { margin-top: 20px; padding: 20px; background: #f39c1222; border-radius: 10px; border: 1px solid #f39c12; display: none; }
        .calc-value { font-size: 26px; font-weight: bold; color: #f39c12; }
        .info-text { font-size: 13px; color: #bbb; margin-top: 10px; line-height: 1.4; }
        .warning-box { background: #441a1a; border: 1px solid #e74c3c; padding: 12px; border-radius: 8px; font-size: 12px; margin-top: 20px; }
        .badge { background: #333; padding: 4px 8px; border-radius: 4px; font-size: 12px; color: #f39c12; font-weight: bold; display: inline-block; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>💊 Cortison-Schema (Teupe)</h2>
    
    <div class="input-group">
        <label>Therapie-Form:</label>
        <select id="therapy" onchange="calculateTeupe()">
            <option value="pump">Insulinpumpe (CSII)</option>
            <option value="pen">Pen / Spritze (ICT)</option>
        </select>
    </div>

    <div class="section-title">Medikament & Dosis</div>
    <div class="input-group">
        <label>Cortison-Art wählen:</label>
        <select id="cortisonType" onchange="calculateTeupe()">
            <option value="1">Prednisolon / Prednison (z.B. Decortin)</option>
            <option value="0.2">Kortisol / Hydrocortison</option>
            <option value="1.25">Methylprednisolon (z.B. Urbason)</option>
            <option value="5">Triamcinolon (z.B. Volon)</option>
            <option value="1">Fluocortolon</option>
            <option value="2">Cloprednol</option>
            <option value="5">Paramethason</option>
            <option value="7.5">Dexamethason (z.B. Fortecortin)</option>
            <option value="30">Betamethason (extrem stark)</option>
        </select>
    </div>

    <div class="input-group">
        <label>Menge in mg:</label>
        <input type="number" id="cortisonMg" placeholder="z.B. 20" oninput="calculateTeupe()">
    </div>

    <div class="section-title">Insulin-Basis</div>
    <div class="input-group">
        <label>Gesamt-Tagesdosis (TDD) in IE:</label>
        <input type="number" id="tdd" placeholder="Summe Basal + Bolus" oninput="calculateTeupe()">
    </div>

    <div id="result" class="result-box">
        <div id="output-content"></div>
    </div>

    <div class="warning-box">
        <strong>⚠️ WICHTIG:</strong><br>
        Die Insulinresistenz beginnt oft erst 2-3 Stunden nach Einnahme. Bei Pumpen die TBR also ggf. leicht versetzt starten. <b>Niemals die Basalrate erhöhen, wenn das Cortison nicht mehr wirkt!</b>
    </div>
</div>

<script>
function calculateTeupe() {
    const tdd = parseFloat(document.getElementById('tdd').value) || 0;
    const mg = parseFloat(document.getElementById('cortisonMg').value) || 0;
    const potency = parseFloat(document.getElementById('cortisonType').value);
    const therapy = document.getElementById('therapy').value;
    const resBox = document.getElementById('result');
    const content = document.getElementById('output-content');

    if (tdd > 0 && mg > 0) {
        resBox.style.display = "block";
        
        // Prednisolon-Äquivalent berechnen
        const equiv = mg * potency;
        
        // Teupe-Zuschlagstabelle (Prednisolon-Äquivalent -> % TDD)
        let percentAdd = 0;
        if (equiv <= 2) percentAdd = 0.10;
        else if (equiv <= 5) percentAdd = 0.20;
        else if (equiv <= 10) percentAdd = 0.40;
        else if (equiv <= 20) percentAdd = 0.60;
        else if (equiv <= 40) percentAdd = 0.80;
        else percentAdd = 1.0; // Ab 40mg Prednisolon Verdopplung möglich

        const totalExtraIE = tdd * percentAdd;
        const hourlyExtra = totalExtraIE / 24;

        let therapyDetail = "";
        if (therapy === "pump") {
            // Vereinfachte TBR Berechnung: (Total Zusatz / Normal-Basal) * 100 + 100
            // Annahme: Basal ist ca. 50% der TDD
            const normalBasalHourly = (tdd * 0.5) / 24;
            const tbrValue = ((hourlyExtra / normalBasalHourly) * 100) + 100;
            
            therapyDetail = `
                <div class="info-text">
                    <strong>Pumpe (TBR):</strong><br>
                    Stelle eine temporäre Basalrate von <strong>${tbrValue.toFixed(0)}%</strong> für 24h ein.<br>
                    <small>(Entspricht +${hourlyExtra.toFixed(2)} IE zusätzlich pro Stunde)</small>
                </div>`;
        } else {
            therapyDetail = `
                <div class="info-text">
                    <strong>Pen / Spritze:</strong><br>
                    Spritze zusätzlich <strong>${totalExtraIE.toFixed(1)} IE</strong> NPH- oder Basalinsulin.<br>
                    <small>Teile die Dosis ggf. auf, falls dein Basalinsulin keine 24h wirkt.</small>
                </div>`;
        }

        content.innerHTML = `
            <div class="badge">Äquivalent: ${equiv.toFixed(1)} mg Prednisolon</div>
            <div class="calc-value">+${totalExtraIE.toFixed(1)} IE gesamt</div>
            <p style="color: #f39c12; margin: 4px 0;">(+${(percentAdd*100).toFixed(0)}% der Tagesdosis)</p>
            ${therapyDetail}
        `;
    } else {
        resBox.style.display = "none";
    }
}
</script>

</body>
</html>
